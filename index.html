<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual World</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🔥 Animated gradient background */
body {
    background: linear-gradient(-45deg, #ff6a00, #ee0979, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🔥 Center content */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* 🔥 Glowing text */
h1 {
    font-size: 50px;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
}

/* 🔥 Button */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: black;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ddd;
}

/* 🔥 News ticker */
.ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    overflow: hidden;
    white-space: nowrap;
}

.ticker-text {
    display: inline-block;
    padding-left: 100%;
    animation: scrollText 10s linear infinite;
    font-size: 20px;
    color: #00ffff;
}

@keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌍 Welcome to our Virtual World</h1>
    <button class="btn" onclick="alert('Welcome Vai 😄')">Enter</button>
</div>

<div class="ticker">
    <div class="ticker-text">
        ✨ Welcome to our Virtual World — Dream, Explore, Feel the Emotion 💙 — Stay Connected — Enjoy the Experience 🚀
    </div>
</div>

</body>
</html>
