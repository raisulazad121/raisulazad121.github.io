<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT University of Bangladesh</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url('https://images.unsplash.com/photo-1523966211575-eb4a01e7dd51') no-repeat center center/cover;
}

/* Dark overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    height: 100vh;
    padding: 40px;
    position: relative;
}

/* Globe animation */
.globe {
    position: absolute;
    right: 15%;
    top: 50%;
    transform: translateY(-50%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
    background-size: cover;
    box-shadow: 0 0 40px rgba(0,200,255,0.8);
    animation: rotate 20s linear infinite;
}

@keyframes rotate {
    from { background-position: 0 0; }
    to { background-position: 400px 0; }
}

/* Title */
.title {
    font-size: 55px;
    font-weight: bold;
}

.sub {
    position: absolute;
    right: 40px;
    top: 40px;
}

/* Layout */
.main {
    display: flex;
    justify-content: space-between;
    margin-top: 120px;
}

/* Left */
.left h2 {
    font-size: 40px;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 14px 30px;
    background: orange;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
}

/* Dropdown */
.menu {
    display: none;
    margin-top: 15px;
}

.menu button {
    display: block;
    margin: 8px 0;
    padding: 12px;
    width: 220px;
    border: none;
    background: rgba(0,0,0,0.7);
    color: white;
    border-radius: 12px;
    cursor: pointer;
}

.menu button:hover {
    background: orange;
}

/* Right */
.right {
    text-align: right;
}

.join {
    font-size: 60px;
    color: orange;
    font-weight: bold;
}

.desc {
    font-size: 20px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="title">IT UNIVERSITY of BANGLADESH</div>
    <div class="sub">100% virtual</div>

    <!-- 🌍 ROTATING GLOBE -->
    <div class="globe"></div>

    <div class="main">

        <div class="left">
            <h2>Get in <b>Worldwide</b></h2>

            <button class="btn" onclick="toggleMenu()">
                Get in Worldwide ⬇
            </button>

            <div id="menu" class="menu">
                <button onclick="go('classes')">📚 Classes</button>
                <button onclick="go('exam')">📝 Exam</button>
                <button onclick="go('library')">📖 Library</button>
                <button onclick="go('game')">🎮 Playground</button>
            </div>
        </div>

        <div class="right">
            <div class="join">Join Now</div>
            <div class="desc">
                Build your virtual life (income, fun, tour, learning)
            </div>
        </div>

    </div>

</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function go(page) {
    alert("Opening: " + page + " (next step e real page banabo 😎)");
}
</script>

</body>
</html>
